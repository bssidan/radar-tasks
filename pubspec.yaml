name: radar_tasks
description: "רדאר התלויות הניהולי - ניהול משימות ותלויות"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Local database (SQLite via Drift) ---
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Local notifications ---
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # --- Home screen widget ---
  home_widget: ^0.6.0

  # --- Communication actions (call / whatsapp / email) ---
  url_launcher: ^6.3.0

  # --- Export / Import JSON ---
  file_picker: ^8.1.2
  share_plus: ^10.0.2

  # --- State management ---
  provider: ^6.1.2

  # --- Misc ---
  intl: ^0.19.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
